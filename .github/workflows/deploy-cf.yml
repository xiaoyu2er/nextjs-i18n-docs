name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'packages/shared/**'
      - 'apps/web/**'
      - 'apps/web-v/**'
      - 'apps/router/**'
      - 'scripts/prepare-content.ts'
  workflow_dispatch:
    inputs:
      workers:
        description: 'Workers to deploy (comma-separated: latest,v13,v14,v15,router or all)'
        required: false
        default: 'all'

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.check.outputs.latest }}
      v13: ${{ steps.check.outputs.v13 }}
      v14: ${{ steps.check.outputs.v14 }}
      v15: ${{ steps.check.outputs.v15 }}
      router: ${{ steps.check.outputs.router }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed workers
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.workers }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              echo "latest=true" >> $GITHUB_OUTPUT
              echo "v13=true" >> $GITHUB_OUTPUT
              echo "v14=true" >> $GITHUB_OUTPUT
              echo "v15=true" >> $GITHUB_OUTPUT
              echo "router=true" >> $GITHUB_OUTPUT
            else
              for w in $(echo "$INPUT" | tr ',' ' '); do
                echo "${w}=true" >> $GITHUB_OUTPUT
              done
            fi
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          # Shared changes trigger all doc workers
          if echo "$CHANGED" | grep -qE '^(packages/shared/|scripts/prepare-content\.ts)'; then
            echo "latest=true" >> $GITHUB_OUTPUT
            echo "v13=true" >> $GITHUB_OUTPUT
            echo "v14=true" >> $GITHUB_OUTPUT
            echo "v15=true" >> $GITHUB_OUTPUT
          fi

          # Content changes — detect which versions
          if echo "$CHANGED" | grep -qE '^content/[^/]+/docs/(01-app|02-pages|03-architecture|04-community|index)'; then
            echo "latest=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^content/[^/]+/(learn|blog)/'; then
            echo "latest=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^content/[^/]+/docs/13/'; then
            echo "v13=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^content/[^/]+/docs/14/'; then
            echo "v14=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^content/[^/]+/docs/15/'; then
            echo "v15=true" >> $GITHUB_OUTPUT
          fi

          # App-specific changes
          if echo "$CHANGED" | grep -qE '^apps/web/'; then
            echo "latest=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^apps/web-v/'; then
            echo "v13=true" >> $GITHUB_OUTPUT
            echo "v14=true" >> $GITHUB_OUTPUT
            echo "v15=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^apps/router/'; then
            echo "router=true" >> $GITHUB_OUTPUT
          fi

  deploy-latest:
    needs: detect-changes
    if: needs.detect-changes.outputs.latest == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --ignore-scripts
      - name: Build & Deploy
        run: |
          cd apps/web
          bun run prepare-content
          NODE_OPTIONS='--max-old-space-size=8192' bun run astro build
          bunx wrangler deploy

  deploy-versioned:
    needs: detect-changes
    strategy:
      matrix:
        include:
          - version: '13'
            enabled: ${{ needs.detect-changes.outputs.v13 == 'true' }}
          - version: '14'
            enabled: ${{ needs.detect-changes.outputs.v14 == 'true' }}
          - version: '15'
            enabled: ${{ needs.detect-changes.outputs.v15 == 'true' }}
    if: needs.detect-changes.outputs.v13 == 'true' || needs.detect-changes.outputs.v14 == 'true' || needs.detect-changes.outputs.v15 == 'true'
    runs-on: ubuntu-latest
    name: Deploy v${{ matrix.version }}
    steps:
      - if: matrix.enabled == 'true'
        uses: actions/checkout@v4
      - if: matrix.enabled == 'true'
        uses: oven-sh/setup-bun@v2
      - if: matrix.enabled == 'true'
        run: bun install --ignore-scripts
      - if: matrix.enabled == 'true'
        name: Build & Deploy v${{ matrix.version }}
        env:
          VERSION: ${{ matrix.version }}
        run: |
          cd apps/web-v
          VERSION=$VERSION bun run deploy

  deploy-router:
    needs: detect-changes
    if: needs.detect-changes.outputs.router == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --ignore-scripts
      - name: Deploy Router
        run: |
          cd apps/router
          bunx wrangler deploy
