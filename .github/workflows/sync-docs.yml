name: Sync Next.js Official Documentation

on:
  workflow_dispatch: # Manual trigger
  # schedule:
  #   - cron: "0 15 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-docs:
    name: Sync Next.js Docs
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR branch exists
        run: |
          if git ls-remote --heads https://github.com/${{ github.repository }}.git | grep -q "docs/sync-nextjs-documentation"; then
            echo "::notice::Branch 'docs/sync-nextjs-documentation' already exists, skipping documentation sync"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Next.js versions
        uses: ./.github/actions/resolve-versions

      - name: Sync docs for all versions
        run: |
          VERSIONS_FILE=".github/nextjs-versions.json"
          LATEST_MAJOR=$(python3 -c "import json; print(json.load(open('$VERSIONS_FILE'))['latestMajor'])")

          # Read each version
          python3 -c "
          import json
          data = json.load(open('$VERSIONS_FILE'))
          for major, version in sorted(data['versions'].items(), key=lambda x: int(x[0])):
              print(f'{major} {version}')
          " | while read -r major version; do
            echo ""
            echo "⏳ Syncing v$major (v$version)..."

            git clone --depth 1 --branch "v$version" --single-branch https://github.com/vercel/next.js.git "nextjs-v$major" 2>/dev/null

            if [ "$major" = "$LATEST_MAJOR" ]; then
              # Latest version goes to root docs/ (exclude old version dirs)
              EXCLUDES=""
              python3 -c "
          import json
          data = json.load(open('$VERSIONS_FILE'))
          for m in data['versions']:
              if m != '$LATEST_MAJOR':
                  print(m)
              " | while read -r exclude_major; do
                EXCLUDES="$EXCLUDES --exclude=$exclude_major"
              done
              mkdir -p apps/docs/content/en/docs
              rsync -av --delete "nextjs-v$major/docs/" apps/docs/content/en/docs/ $EXCLUDES
            else
              # Historical versions go to docs/{major}/
              mkdir -p "apps/docs/content/en/docs/$major"
              rsync -av --delete "nextjs-v$major/docs/" "apps/docs/content/en/docs/$major/"
            fi

            rm -rf "nextjs-v$major"
            echo "✅ v$major synced"
          done

      - name: Setup Tools
        uses: ./.github/actions/setup

      - name: Sync blog & learn
        run: |
          node packages/crawler/dist/index.js

      - name: Check for modifications
        id: check_changes
        run: |
          if [[ $(git status --porcelain | grep -E "apps/docs/content/" | wc -l) -gt 0 ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected. Will proceed with PR."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in docs. Skipping PR."
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "docs: update nextjs documentation"
          title: "docs: update nextjs documentation"
          body: |
            This PR updates the Next.js English documentation from the official Next.js repository.

            Versions synced (auto-resolved from git tags):
            $(cat .github/nextjs-versions.json)

            After merging, run the **Translate Documentation** workflow to update translations.
          branch: docs/sync-nextjs-documentation
          delete-branch: true
          base: dev
          add-paths: |
            apps/docs/content/en/
            .github/nextjs-versions.json
