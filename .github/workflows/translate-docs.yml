name: Translate Documentation

on:
  # schedule:
  #   - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      target_language:
        description: 'Target language code (e.g., "zh-hans", "ja"). Leave empty for zh-hans.'
        required: false
        type: string
        default: 'zh-hans'
      pattern:
        description: 'File pattern (e.g., "docs/01-app/**/*.mdx"). Leave empty for all.'
        required: false
        type: string
        default: '**/*.mdx'
      max_files:
        description: 'Maximum number of files to process'
        required: false
        type: number
      concurrency:
        description: 'Number of concurrent translation tasks'
        required: false
        type: number
        default: 10
      model:
        description: 'Model to use for translation'
        required: false
        type: string
        default: 'openrouter/hunter-alpha'
      skip_sync:
        description: 'Skip downloading latest docs (translate current content/en/)'
        required: false
        type: boolean
        default: false
      skip_replace:
        description: 'Skip replacing content/{lang}/ (keep output in tmp/)'
        required: false
        type: boolean
        default: false
      pr_branch:
        description: 'Branch name for the pull request'
        required: false
        type: string
        default: 'docs/update-translations'

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check API key
        env:
          API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/actions/setup

      - name: Run sync and translate
        run: |
          ARGS=""

          if [ "${{ inputs.skip_sync }}" = "true" ]; then
            ARGS="$ARGS --skip-sync"
          fi

          if [ "${{ inputs.skip_replace }}" = "true" ]; then
            ARGS="$ARGS --skip-replace"
          fi

          ARGS="$ARGS --lang ${{ inputs.target_language || 'zh-hans' }}"
          ARGS="$ARGS --pattern '${{ inputs.pattern || '**/*.mdx' }}'"
          ARGS="$ARGS --concurrency ${{ inputs.concurrency || '10' }}"
          ARGS="$ARGS --api-type openai"
          ARGS="$ARGS --api-base-url https://openrouter.ai/api/v1"
          ARGS="$ARGS --api-key $OPENROUTER_API_KEY"
          ARGS="$ARGS --model ${{ inputs.model || 'openrouter/hunter-alpha' }}"

          if [ -n "${{ inputs.max_files }}" ]; then
            ARGS="$ARGS --max ${{ inputs.max_files }}"
          fi

          bash scripts/sync-and-translate.sh $ARGS
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Check for modifications
        id: check-changes
        run: |
          if [[ $(git status --porcelain | wc -l) -gt 0 ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "docs: update translations (${{ inputs.target_language || 'zh-hans' }})"
          title: "docs: update translations (${{ inputs.target_language || 'zh-hans' }})"
          body: |
            This PR updates documentation translations using the incremental MD5-cached pipeline.

            - Language: ${{ inputs.target_language || 'zh-hans' }}
            - Model: ${{ inputs.model || 'openrouter/hunter-alpha' }}
            - Pattern: ${{ inputs.pattern || '**/*.mdx' }}

            Translation cache is updated in `.cache/`.
          branch: ${{ inputs.pr_branch || 'docs/update-translations' }}
          delete-branch: true
          base: dev
          add-paths: |
            content/
            .cache/
