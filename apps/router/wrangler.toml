name = "nextjs-docs-router"
main = "src/index.ts"
compatibility_date = "2025-03-14"

# Service bindings to version-specific workers
[[services]]
binding = "LATEST"
service = "nextjs-docs-latest"

[[services]]
binding = "V13_DOCS"
service = "nextjs-docs-v13"

[[services]]
binding = "V14_DOCS"
service = "nextjs-docs-v14"

[[services]]
binding = "V15_DOCS"
service = "nextjs-docs-v15"

# Custom domain
# [routes]
# pattern = "nextjs.im/*"
